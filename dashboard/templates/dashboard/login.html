{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Sign in · Rakesh Packers Admin</title>
    <link rel="icon" href="{% static 'assets/images/logo/favicon.svg' %}"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
<div class="w-full max-w-sm">
    <div class="text-center mb-6">
        <img src="{% static 'assets/images/logo/Rakesh_Packers_logo.svg' %}" class="mx-auto h-12" alt=""/>
        <h1 class="mt-4 text-xl font-semibold text-slate-900">Admin sign in</h1>
        <p class="text-slate-500 text-sm">Enter your dashboard credentials</p>
    </div>

    <form method="post" class="bg-white rounded-lg shadow-sm border border-slate-200 p-6 space-y-4">
        {% csrf_token %}
        {% if error %}
        <div class="bg-rose-50 border border-rose-200 text-rose-800 text-sm rounded px-3 py-2">
            {{ error }}
        </div>
        {% endif %}
        <label class="block">
            <span class="text-sm font-medium text-slate-700">Username</span>
            <input name="username" type="text" required autofocus
                   class="mt-1 block w-full rounded border-slate-300 border px-3 py-2 focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none"/>
        </label>
        <label class="block">
            <span class="text-sm font-medium text-slate-700">Password</span>
            <input name="password" type="password" required
                   class="mt-1 block w-full rounded border-slate-300 border px-3 py-2 focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none"/>
        </label>
        <button type="submit"
                class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 rounded transition">
            Sign in
        </button>
    </form>

    <p class="text-center text-xs text-slate-400 mt-4">Rakesh Packers · Admin</p>
</div>
</body>
</html>
